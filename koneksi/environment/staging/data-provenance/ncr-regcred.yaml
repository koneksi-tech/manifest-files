# Same NCR pull secret as koneksi-backend (namespace koneksi-staging).
apiVersion: v1
kind: Secret
metadata:
  name: ncr-regcred
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "https://36163004-kr1-registry.container.nhncloud.com": {
          "username": "YOUR_NCR_ACCESS_KEY",
          "password": "YOUR_NCR_SECRET_KEY"
        },
        "36163004-kr1-registry.container.nhncloud.com": {
          "username": "YOUR_NCR_ACCESS_KEY",
          "password": "YOUR_NCR_SECRET_KEY"
        }
      }
    }
