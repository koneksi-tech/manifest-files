# Strategic merge on global/base/service/service.yml — then JSON patch replaces /spec/ports (see kustomization.yml)
apiVersion: v1
kind: Service
metadata:
  name: base-svc
spec:
  type: ClusterIP
  selector:
    app: koneksi-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
