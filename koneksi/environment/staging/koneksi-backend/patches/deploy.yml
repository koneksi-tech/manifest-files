# Strategic merge on global/base/deploy/deploy.yml (metadata.name: base-deploy)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: base-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: koneksi-backend
  template:
    metadata:
      labels:
        app: koneksi-backend
    spec:
      imagePullSecrets:
        - name: ncr-regcred
      containers:
        - name: base-deploy
          image: base-image
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: koneksi-backend-config
            - secretRef:
                name: koneksi-backend-secret
          # livenessProbe:
          #   httpGet:
          #     path: /check-health
          #     port: http
          #   initialDelaySeconds: 15
          #   periodSeconds: 20
          #   timeoutSeconds: 5
          #   failureThreshold: 3
          # readinessProbe:
          #   httpGet:
          #     path: /check-health
          #     port: http
          #   initialDelaySeconds: 5
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          #   failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
