# Argo CD Application — s3-gateway (staging).
# Apply into the argocd namespace:
#   kubectl apply -f koneksi/argocd/environment/staging/s3-gateway-argocd.yml -n argocd
#
# Requires: repo credential Secret in argocd (see argocd/SECRETS.md). Optional: Argo CD Image Updater for annotations below.
# Namespace + ncr-regcred: not in this kustomize — ensure koneksi-backend-staging syncs first (or NS + Secret exist).

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: s3-gateway-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-image-updater.argoproj.io/image-list: base-image=36163004-kr1-registry.container.nhncloud.com/koneksi-tech/koneksi-s3-gateway
    argocd-image-updater.argoproj.io/base-image.update-strategy: newest-build
    argocd-image-updater.argoproj.io/base-image.allow-tags: regexp:^v[0-9].*-staging$
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:koneksi-tech/manifest-files.git
    targetRevision: main
    path: koneksi/environment/staging/s3-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: koneksi-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
