# Staging PostgreSQL instance A — dedicated to one app (Bitnami: bitnamicharts/postgresql)
#
#   helm upgrade --install postgres-staging-app-a oci://registry-1.docker.io/bitnamicharts/postgresql \
#     -n postgresql --create-namespace -f postgres/environment/staging/postgres-app-a.values.yml
#
# Replace CHANGEME_* or wire auth.existingSecret before install. Do not commit real passwords.
# Storage: apply global/nks/storageclass-block-ssd.yml first (NHN NKS block SSD).
# Service: LoadBalancer — prefer VPN/bastion; restrict loadBalancerSourceRanges + NHN security groups.

global:
  defaultStorageClass: nhn-block-ssd
  defaultFips: "off"

architecture: standalone

fullnameOverride: postgresql-staging-app-a

auth:
  enablePostgresUser: true
  postgresPassword: superuser_a
  username: app_a
  password: 1hZj4KtL5k4gZ3Kg
  database: koneksi

primary:
  persistence:
    enabled: true
    storageClass: nhn-block-ssd
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  fips:
    openssl: "off"
  service:
    type: LoadBalancer
    ports:
      postgresql: 5432
    # loadBalancerSourceRanges:
    #   - 203.0.113.0/24

# Cinder/block PVCs are often root-owned; Bitnami runs non-root → enable init chown on the mount.
volumePermissions:
  enabled: true
