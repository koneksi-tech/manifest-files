---
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: net3-mongodb
  namespace: mongodb
spec:
  members: 3
  type: ReplicaSet
  version: "5.0.15"
  replicaSetHorizons:
  - horizon: mongodb1.mmi.local:31181
  - horizon: mongodb2.mmi.local:31182
  - horizon: mongodb3.mmi.local:31183
  security:
    authentication:
      modes: ["SCRAM"]
    tls:
      enabled: false
  statefulSet:
    spec:
      template:
        spec:
          # affinity:
          #   nodeAffinity:
          #     requiredDuringSchedulingIgnoredDuringExecution:
          #       nodeSelectorTerms:
          #         - matchExpressions:
          #             - key: cache
          #               operator: In
          #               values:
          #                 - "true"
          nodeSelector:
            cache: "true"
          tolerations:
            - operator: Exists
  users:
    - name: my-user
      db: admin
      passwordSecretRef: # a reference to the secret that will be used to generate the user's password
        name: my-user-password
      roles:
        - name: clusterAdmin
          db: admin
        - name: userAdminAnyDatabase
          db: admin
      scramCredentialsSecretName: my-scram
  additionalMongodConfig:
    storage.wiredTiger.engineConfig.journalCompressor: zlib

# the user credentials will be generated from this secret
# once the credentials are generated, this secret is no longer required
---
apiVersion: v1
kind: Secret
metadata:
  name: my-user-password
  namespace: mongodb
type: Opaque
stringData:
  password: 05yY6kamQqsqUMPg

---
kind: Service
apiVersion: v1
metadata:
  name: external-mongo-service-0
  namespace: mongodb
spec:
  type: NodePort
  selector:
    app: net3-mongodb-svc
    statefulset.kubernetes.io/pod-name: net3-mongodb-0
  ports:
    - protocol: TCP
      nodePort: 31181
      port: 31181
      targetPort: 27017


---
kind: Service
apiVersion: v1
metadata:
  name: external-mongo-service-1
  namespace: mongodb
spec:
  type: NodePort
  selector:
    app: net3-mongodb-svc
    statefulset.kubernetes.io/pod-name: net3-mongodb-1
  ports:  
    - nodePort: 31182
      port: 31182
      targetPort: 27017


---
kind: Service
apiVersion: v1
metadata:
  name: external-mongo-service-2
  namespace: mongodb
spec:
  type: NodePort
  selector:
    app: net3-mongodb-svc
    statefulset.kubernetes.io/pod-name: net3-mongodb-2
  ports:  
    - nodePort: 31183
      port: 31183
      targetPort: 27017