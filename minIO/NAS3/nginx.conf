server {
    server_name minio-api.seven-gen.net www.minio-api.seven-gen.net;

    location / {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Disable buffering for large uploads
        proxy_buffering off;
        
        # Remove upload size restriction
        client_max_body_size 0;

        # Optional timeout settings to support large uploads
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;

        proxy_pass http://k8s_servers;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/minio-api.seven-gen.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/minio-api.seven-gen.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = minio-api.seven-gen.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        server_name minio-api.seven-gen.net www.minio-api.seven-gen.net;
    listen 80;
    return 404; # managed by Certbot


}
