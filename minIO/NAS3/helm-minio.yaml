environment:
  MINIO_BROWSER: "on"
mode: distributed
persistence:
  accessMode: ReadWriteOnce
  enabled: true
  size: 5000Gi
  storageClass: nfs-nas2
replicas: 5
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 1000m
    memory: 2Gi
service:
  type: ClusterIP
tolerations:
- effect: NoSchedule
  key: role
  operator: Equal
  value: cache
