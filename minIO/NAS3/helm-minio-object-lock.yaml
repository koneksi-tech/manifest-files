environment:
  MINIO_BROWSER: "on"
  # Enable Object Lock support
  MINIO_OBJECT_LOCK: "on"
  # This environment variable is crucial for Object Lock
mode: distributed
persistence:
  accessMode: ReadWriteOnce
  enabled: true
  size: 5000Gi
  storageClass: nfs-nas2
replicas: 5
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 1000m
    memory: 2Gi
service:
  type: ClusterIP
tolerations:
- effect: NoSchedule
  key: role
  operator: Equal
  value: cache

# Additional MinIO configuration for Object Lock
defaultBucket:
  enabled: true
  # Object Lock must be enabled at bucket creation time
  objectLocking: true
  
# Bucket policies for Object Lock
policies:
  - name: object-lock-policy
    statements:
      - resources:
          - "arn:aws:s3:::your-bucket-name/*"
        actions:
          - "s3:GetObjectRetention"
          - "s3:PutObjectRetention"
          - "s3:GetObjectLegalHold"
          - "s3:PutObjectLegalHold"
        effect: Allow 