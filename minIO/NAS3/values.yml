mode: distributed
replicas: 3
persistence:
  enabled: true
  storageClass: "nfs-storage-class-nas3" # requires nfs-storage-class-nas3
  accessMode: ReadWriteOnce
  size: 100Gi
resources:
  limits:
    memory: "2Gi"
    cpu: "1000m"
environment:
  MINIO_BROWSER: "on"
service:
  type: ClusterIP

# command: helm install minio minio/minio -f minIO/NAS3/values.yml --namespace minio-operator

# NAME: minio
# LAST DEPLOYED: Tue Nov  5 10:49:13 2024
# NAMESPACE: minio-operator
