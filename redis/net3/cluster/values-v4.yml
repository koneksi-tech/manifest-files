architecture: standalone
auth:
  existingSecret: redis-password-secret
  existingSecretPasswordKey: password
global:
  storageClass: longhorn
image:
  tag: 7.2.4-debian-12-r12
master:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
            - worker-3-128
            - worker-3-55
            - k8s-3
            - mmi
            - worker-3-248
            - sql2
            - worker-3-130-a9ead6e9
            - dc-redis
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: redis
        topologyKey: kubernetes.io/hostname
  count: 1
  livenessProbe:
    enabled: false
  persistence:
    size: 100Gi
  readinessProbe:
    enabled: false
  resources:
    limits:
      cpu: 4
      memory: 40Gi
  service:
    nodePorts:
      redis: "31459"
    type: NodePort
  tolerations:
  - effect: NoSchedule
    key: usage
    value: cache
  - effect: NoSchedule
    key: dept
    value: dc
  - effect: NoSchedule
    key: role
    value: cache
replica:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
            - worker-3-128
            - worker-3-55
            - k8s-3
            - mmi
            - worker-3-248
            - sql2
            - worker-3-130-a9ead6e9
            - dc-redis
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: redis
        topologyKey: kubernetes.io/hostname
  livenessProbe:
    enabled: false
  persistence:
    size: 100Gi
  readinessProbe:
    enabled: false
  replicaCount: 1
  resources:
    limits:
      cpu: 4
      memory: 40Gi
  service:
    nodePorts:
      redis: "30234"
    type: NodePort
  tolerations:
  - effect: NoSchedule
    key: usage
    value: cache
  - effect: NoSchedule
    key: dept
    value: dc
  - effect: NoSchedule
    key: role
    value: cache
  - key: airflow-only
    operator: Exists
sentinel:
  enabled: false
commonConfiguration: |-
  # Enable AOF https://redis.io/topics/persistence#append-only-file
  appendonly no
  # Disable RDB persistence, AOF persistence already enabled.
  save ""