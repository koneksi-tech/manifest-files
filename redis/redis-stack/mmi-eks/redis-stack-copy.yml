# ---
# apiVersion: v1
# kind: Namespace
# metadata:
#   name: redis-stack
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-stack-bb-deployment
  namespace: redis-stack
  labels:
    app: redis-stack-bb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-stack-bb
  template:
    metadata:
      labels:
        app: redis-stack-bb
    spec:  
      containers:
        - name: redis-stack-busybox
          image: busybox
          command:
          - /bin/sh
          - -c
          - sleep "30000"
          ports:
            - containerPort: 6379
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /data
              name: redis-stack-data
      restartPolicy: Always
      volumes:
        - name: redis-stack-data
          persistentVolumeClaim:
            claimName: redis-stack-data-redis-stack-0
