# Staging: standalone Redis (Bitnami chart: oci://registry-1.docker.io/bitnamicharts/redis)
#
#   First time or anytime (idempotent): use --install or plain install will work once.
#   helm upgrade --install redis-staging oci://registry-1.docker.io/bitnamicharts/redis \
#     -n redis --create-namespace -f redis/environment/staging/values.yml
#   Plain `helm upgrade` alone fails with "has no deployed releases" until a release exists.
#   Uninstall: helm uninstall redis-staging -n redis
#
# Replace CHANGEME_REDIS_PASSWORD or use auth.existingSecret.
# Storage: apply global/nks/storageclass-block-ssd.yml first (NHN NKS block SSD).
# Service: LoadBalancer — lock down with cloud SG + optional loadBalancerSourceRanges.
#
# MISCONF / "unable to persist": disk full, volume RW issues, or BGSAVE fork OOM. Check pod logs,
# `redis-cli INFO persistence`, and PVC usage. Staging below disables periodic RDB saves and relaxes
# stop-on-bgsave-error so Asynq keeps working (queue is ephemeral; tighten for prod).

global:
  defaultStorageClass: nhn-block-ssd

architecture: standalone

fullnameOverride: redis-staging

auth:
  enabled: true
  password: uR8tV4wZ7gH2jM5pS1xA9cF6iL0oQ3nE/

master:
  count: 1
  persistence:
    enabled: true
    storageClass: nhn-block-ssd
    size: 8Gi
  service:
    type: LoadBalancer
    ports:
      redis: 6379
    # loadBalancerSourceRanges:
    #   - 203.0.113.0/24
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

commonConfiguration: |-
  appendonly no
  maxmemory-policy allkeys-lru
  save ""
  stop-writes-on-bgsave-error no
