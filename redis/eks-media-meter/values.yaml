replica:
  replicaCount: 0

master:
  service:
    type: LoadBalancer
  tolerations:
    - key: prod-only
      operator: "Exists"
    - key: mailer-only
      operator: "Exists"
    - key: syncer-only
      operator: "Exists"
    - key: corpus-only
      operator: "Exists"
    - key: scoup-api-only
      operator: "Exists"
    - key: scoup-data-only
      operator: "Exists"
  resources: 
    requests:
      cpu: 100m
      memory: 128Mi

# image:
#   registry: docker.io
#   repository: zen0hub/redis
#   tag: 7.4.2-debian-12-r0

#   pullSecrets: 
#   - regcred

global:
  security:
    allowInsecureImages: true

commonConfiguration: |-
  # Enable AOF https://redis.io/topics/persistence#append-only-file
  appendonly no
  # Disable RDB persistence, AOF persistence already enabled.
  save ""